# WS-Sale-App — Docker Compose
# ─────────────────────────────────────────────────────────────
# โหมดใช้งาน:
#   1) ใช้ DB ภายนอก (Railway/remote ปัจจุบัน):  docker compose up -d
#        → สตาร์ทเฉพาะ backend + frontend (DB อยู่ที่ remote/Railway)
#   2) Self-host DB ครบชุด (ย้ายมา Cloud/On-prem):  docker compose --profile db up -d
#        → สตาร์ท sqlserver + mysql + backend + frontend
# ตั้งค่าใน .env (คัดลอกจาก .env.docker.example)
services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_MODE: remote
      REMOTE_DB_SERVER: ${REMOTE_DB_SERVER}
      REMOTE_DB_PORT: ${REMOTE_DB_PORT:-1433}
      REMOTE_DB_USER: ${REMOTE_DB_USER}
      REMOTE_DB_PASSWORD: ${REMOTE_DB_PASSWORD}
      DB_NAME: ${DB_NAME:-dbwins_worldfert9}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
      # TruckScale MySQL (pool แยก — ตั้งค่าให้ชี้ external หรือ service mysql ด้านล่าง)
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db_truckscale}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./WSSale-App
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
        VITE_USE_MOCKUP_DATA: "false"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── ฐานข้อมูล (เลือกใช้เมื่อ self-host: --profile db) ──────────
  sqlserver:
    profiles: ["db"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${REMOTE_DB_PASSWORD}
      MSSQL_PID: Express          # Express = ฟรี (จำกัด 10GB/DB); เปลี่ยนเป็น Developer/Standard ตาม license
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  mysql:
    profiles: ["db"]
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db_truckscale}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # วางไฟล์ dump TruckScale (.sql) ที่นี่เพื่อ import อัตโนมัติครั้งแรก:
      - ./db-init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mssql_data:
  mysql_data:
